<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZS Case v2.0</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b10;
  color:white;
  overflow:hidden;
}

.center {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:20px;
}

.case {
  width:180px;
  height:140px;
  background:#1a1a22;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid #2a2a35;
  transition:0.2s;
}
.case:active { transform:scale(0.97); }

.roulette {
  width:90%;
  height:140px;
  overflow:hidden;
  background:#111;
  border-radius:10px;
  display:none;
  position:relative;
}

.strip {
  display:flex;
  height:100%;
  transition:transform 6s cubic-bezier(.12,.8,.12,1);
}

.item {
  min-width:120px;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1d1d28;
  border-right:1px solid #2b2b3a;
}

.pointer {
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:2px;
  height:100%;
  background:gold;
}

.result {
  display:none;
  font-size:20px;
}

.admin {
  position:fixed;
  right:10px;
  top:10px;
  padding:6px 10px;
  background:#222;
  font-size:12px;
  cursor:pointer;
}

.panel {
  position:fixed;
  right:0;
  top:0;
  width:240px;
  height:100%;
  background:#15151d;
  transform:translateX(100%);
  transition:.3s;
  padding:10px;
}

.panel.open { transform:translateX(0); }
</style>
</head>

<body>

<div class="admin" id="adminBtn">admin</div>

<div class="center">

  <div class="case" id="case">CASE</div>

  <div class="roulette" id="roulette">
    <div class="pointer"></div>
    <div class="strip" id="strip"></div>
  </div>

  <div class="result" id="result"></div>

</div>

<div class="panel" id="panel">
  <h4>ADMIN</h4>
  <p>state editor</p>
</div>

<script>

const STATE = {
  IDLE: "idle",
  SPIN: "spin",
  RESULT: "result"
};

let state = STATE.IDLE;

let locked = false;

const items = [
  "Салфетки",
  "Кофе",
  "1л бензина",
  "2л бензина",
  "100₽",
  "Сладкий бонус",
  "День X"
];

const caseBtn = document.getElementById("case");
const roulette = document.getElementById("roulette");
const strip = document.getElementById("strip");
const result = document.getElementById("result");

function setState(s){
  state = s;
}

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<40;i++){
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = items[Math.floor(Math.random()*items.length)];
    strip.appendChild(div);
  }
}

function spin(){
  if(locked) return;
  locked = true;

  setState(STATE.SPIN);

  buildStrip();

  roulette.style.display = "block";

  setTimeout(()=>{
    const offset = -(120*25);
    strip.style.transform = `translateX(${offset}px)`;

    setTimeout(()=>{
      showResult();
    }, 6000);

  },100);
}

function showResult(){
  setState(STATE.RESULT);

  const win = items[Math.floor(Math.random()*items.length)];

  result.style.display = "block";
  result.textContent = "Выигрыш: " + win;

  locked = false;
}

function reset(){
  setState(STATE.IDLE);
  roulette.style.display = "none";
  result.style.display = "none";
  strip.style.transform = "translateX(0)";
}

caseBtn.onclick = spin;

document.addEventListener("keydown",(e)=>{
  if(e.key === "Enter"){
    if(state === STATE.IDLE) spin();
    else if(state === STATE.RESULT) reset();
  }
});

document.getElementById("adminBtn").onclick = ()=>{
  document.getElementById("panel").classList.toggle("open");
};

</script>

</body>
</html>
