<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AZS Case Simulator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#05050a;
--surface:#111118;
--text:#fff;
--text-dim:#8899aa;
--gold:#ffd700;
--green:#00e070;
--blue:#3b82f6;
}

/* === BODY === */
body{
height:100vh;
overflow:hidden;
background:#05050a;
color:#fff;
font-family:sans-serif;
}

/* === НЕОНОВЫЙ ФОН (ИСПРАВЛЕННЫЙ) === */
#cyber-bg{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
overflow:hidden;
}

#cyber-bg::before{
content:"";
position:absolute;
width:400%;
height:400%;
top:-150%;
left:-150%;

background:repeating-linear-gradient(
-45deg,
rgba(0,255,150,0.35) 0px,
rgba(0,255,150,0.35) 4px,
rgba(0,150,255,0.35) 4px,
rgba(0,150,255,0.35) 8px,
transparent 8px,
transparent 140px
);

animation:moveBg 18s linear infinite, neonShift 5s ease-in-out infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(400px,400px)}
}

@keyframes neonShift{
0%{filter:hue-rotate(0deg) blur(1px) drop-shadow(0 0 10px #00ff99)}
50%{filter:hue-rotate(140deg) blur(2px) drop-shadow(0 0 20px #0096ff)}
100%{filter:hue-rotate(0deg) blur(1px) drop-shadow(0 0 10px #00ff99)}
}

/* === APP === */
.app{
position:relative;
z-index:1;
height:100vh;
display:flex;
flex-direction:column;
}

/* === HEADER === */
header{
height:40px;
display:flex;
align-items:center;
padding:0 15px;
background:#111118;
border-bottom:1px solid #222;
}

/* === MAIN === */
.stage{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
}

/* === КЕЙС === */
.case-box{
width:180px;
height:130px;
background:#111118;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #222;
}

/* === РУЛЕТКА === */
.roulette-wrap{
width:90%;
height:160px;
background:#111118;
border-radius:12px;
overflow:hidden;
border:1px solid #222;
}

.roulette-viewport{
width:100%;
height:100%;
overflow:hidden;
background:#111118;
}

.roulette-strip{
display:flex;
height:100%;
}

.card{
width:140px;
height:100%;
background:#1a1a24;
display:flex;
align-items:center;
justify-content:center;
border-right:1px solid #222;
}

/* === КОЛЕСО === */
.wheel-wrap{
background:#111118;
padding:10px;
border-radius:12px;
border:1px solid #222;
}

.wheel-container{
width:300px;
height:300px;
background:#0f0f16;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* === КНОПКА === */
button{
padding:10px 20px;
background:#00e070;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* === УБИРАЕМ ВСЮ ПРОЗРАЧНОСТЬ === */
.roulette-wrap,
.wheel-wrap,
.case-box,
.card,
.wheel-container{
background-color:#111118 !important;
opacity:1 !important;
backdrop-filter:none !important;
}

</style>
</head>

<body>

<div id="cyber-bg"></div>

<div class="app">

<header>АЗС ЭКО</header>

<div class="stage">

<div class="case-box">
КЕЙС
</div>

<div class="roulette-wrap">
<div class="roulette-viewport">
<div class="roulette-strip">
<div class="card">1</div>
<div class="card">2</div>
<div class="card">3</div>
<div class="card">4</div>
</div>
</div>
</div>

<div class="wheel-wrap">
<div class="wheel-container">
🎯
</div>
</div>

<button onclick="alert('спин')">Крутить</button>

</div>
</div>

</body>
</html>
